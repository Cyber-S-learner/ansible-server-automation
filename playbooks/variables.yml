---
 - name: Install and Manage Service Using Variables
   hosts: web
   become: yes

   vars:
     package_name: nginx
     service_name: nginx

   tasks:
     - name: Install package
       apt:
         name: "{{ package_name }}"
         state: present
         update_cache: yes
     
     - name: Start Service
       service:
         name: "{{service_name}}"
         state: started
         enabled: yes
